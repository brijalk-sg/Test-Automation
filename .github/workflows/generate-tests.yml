# Add this stage to your existing .gitlab-ci.yml

stages:
  - test-gen    # Add before your test stage
  - test
  # ... your other stages

generate-tests:
  stage: test-gen
  image: node:20
  rules:
    # Only run on merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # CLAUDE_API_KEY and GITLAB_TOKEN should be set in
    # GitLab → Settings → CI/CD → Variables (masked + protected)
    GIT_STRATEGY: clone
    GIT_DEPTH: 0  # Full clone needed for diff
  script:
    - npm install  # Or use a cached image with deps
    - node scripts/generate-tests.mjs
    # Auto-commit generated test files back to the MR branch
    - |
      git config user.email "ci-bot@yourcompany.com"
      git config user.name "Test Gen Bot"
      git add "**/*.test.tsx" "**/*.test.jsx"
      # Only commit if there are changes
      git diff --staged --quiet || {
        git commit -m "chore: auto-generate test cases [skip ci]"
        git push "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      }
  allow_failure: true  # Don't block MR if generation fails